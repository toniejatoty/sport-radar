<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Add stage</title>
</head>
<body>
    <h1>Add new stage</h1>
    <form th:action="@{/stage/save}" th:object="${stage}" method="post">
        <label>Nazwa Etapu</label>
        <input type="text" th:field="*{id}" placeholder="ROUND OF 16" required />
        <br>

        <input type="text" th:field="*{name}" placeholder="ROUND OF 16" required />
        <br>
        <input type="text" th:field="*{ordering}" placeholder="4" required />
        <br>

        
        <br>
        <button type="submit">Save stage</button>
    </form>
    <br>
    <a href="/stage">Back to list</a>
</body>
</html>

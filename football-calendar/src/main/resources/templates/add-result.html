<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
    <head>
        <title>Add stage</title>
    </head>
    <body>
        <h1>Add new result</h1>
        <form th:action="@{/results/save}" th:object="${result}" method="post">
            <label>Number of home goals</label>
            <input type="text" th:field="*{homeGoals}"  required />
            <br>
            <label>Number of away goals</label>
            <input type="text" th:field="*{awayGoals}"  required />
            <br>
            <label> Winner </label>
            <select th:field="*{winner}">
                <option value="" disabled selected>
                </option>
                <option
                    th:each="t: ${teams}"
                    th:value="${t.id}"
                    th:text="${t.name}"
                    >

                </option>

            </select>
            <br>
            <label>Message</label>
            <input type="text" th:field="*{message}"/>
            <br>

            <br>
            <button type="submit">Save stage</button>
        </form>
        <br>
        <a href="/results">Back to list</a>
    </body>
</html>

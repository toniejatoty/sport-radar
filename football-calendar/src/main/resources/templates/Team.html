<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
    <head>
        <title>Team List</title>
    </head>
    <body>
        <h1>All Teams</h1>
        <table border="1">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Team name</th>
                    <th>Official team name</th>
                    <th>slug</th>
                    <th>Abbreviation</th>
                    <th>TeamCountryCode</th>
                    <th>StagePosition</th>
                    <th>TeamInformation</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="t : ${team}">
                    <td th:text="${t.id}"></td>
                    <td th:text="${t.name}"></td>
                    <td th:text="${t.officialName}"></td>
                    <td th:text="${t.slug}"></td>
                    <td th:text="${t.abbreviation}"></td>
                    <td th:text="${t.teamCountryCode}"></td>
                    <td th:text="${t.stagePosition}"></td>
                    <td th:text="${t.team_information}"></td>
                    
                </tr>
            </tbody>
        </table>
        <br>
        <a href="/teams/add">Add new team</a>
    </body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Kalendarz Wydarzeń</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

    <h1>📅 Kalendarz Rozgrywek</h1>
    
    <div class="nav">
        <a href="/teams" class="btn">Lista Drużyn</a>
        <a href="/teams/add" class="btn btn-add">Dodaj Drużynę</a>
    </div>

    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Mecz (Gospodarz vs Gość)</th>
                <th>Etap (Stage)</th>
                <th>Grupa</th>
                <th>Wynik</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="event : ${matches}">
                <td th:text="${event.id}">1</td>
                
                <td>
                    <span class="team-name" th:text="${event.homeTeam != null ? event.homeTeam.name : 'TBD'}">Gospodarz</span>
                    <span class="vs">vs</span>
                    <span class="team-name" th:text="${event.awayTeam != null ? event.awayTeam.name : 'TBD'}">Gość</span>
                </td>

                <td th:text="${event.stage != null ? event.stage.name : '-'}">Faza grupowa</td>
                
                <td th:text="${event.group != null ? event.group.name : '-'}">Grupa A</td>

                <td class="score">
                    <span th:if="${event.result != null}" 
                          th:text="${event.result.homeScore + ' : ' + event.result.awayScore}">0 : 0</span>
                    <span th:unless="${event.result != null}">Nadchodzący</span>
                </td>
            </tr>
        </tbody>
    </table>

</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
    <head>
        <meta charset="UTF-8">
        <title>Event Calendar</title>
        <link rel="stylesheet" th:href="@{/css/style.css}">
    </head>
    <body>

        <h1>Competition Calendar</h1>
<nav class="navbar">
    <div class="nav-container">
        <a th:href="@{/events}" class="nav-logo">SportRadar App</a>
        <ul class="nav-links">
            <li><a th:href="@{/events}">Home</a></li>
            <li><a th:href="@{/events/add}">Add Event</a></li>

            <li><a href="#">Team List</a></li>
            <li><a href="#">View groups</a></li>
            <li><a href="#">Show Stages</a></li>
            <li><a href="#">Show results</a></li>
        </ul>
    </div>
</nav>
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Match (Home vs Away)</th>
                    <th>Stage</th>
                    <th>Group</th>
                    <th>Result</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="event : ${matches}">
                    <td><a th:href="@{/events/{id}(id=${event.id})}"
                           th:text="${event.id}"
                </td>

                <td>
                    <span class="team-name" th:text="${event.homeTeam != null ? event.homeTeam.name : 'NONE'}"></span>
                    <span class="vs">vs</span>
                    <span class="team-name" th:text="${event.awayTeam != null ? event.awayTeam.name : 'NONE'}"></span>
                </td>

                <td th:text="${event.stage != null ? event.stage.name : '-'}"></td>

                <td th:text="${event.group != null ? event.group.name : '-'}"></td>

                <td class="score">
                    <span th:if="${event.result != null}" 
                          th:text="${event.result.homeGoals + ' : ' + event.result.awayGoals}"></span>
                    <span th:unless="${event.result != null}">Upcoming</span>
                </td>
            </tr>
        </tbody>
    </table>

</body>
</html>
